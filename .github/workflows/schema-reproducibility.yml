name: Schema Reproducibility (DR)

# SECRET GEREKTİRMEZ. Tüm migration'ları sıfırdan boş bir postgres'e uygular.
# Amaç: "Bir saldırgan şemayı silse, migration'lardan TAM geri kurulabilir mi?"
# Bir tablo/trigger migration'a eklenmeyi unutulursa (return_requests gibi) bu
# workflow FAIL eder ve PR'ı bloklar. Her push + haftalık çalışır.

on:
  push:
    paths:
      - 'supabase/migrations/**'
  pull_request:
    paths:
      - 'supabase/migrations/**'
  schedule:
    - cron: '0 3 * * 1'   # her Pazartesi 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  reproduce-schema:
    runs-on: ubuntu-latest
    services:
      pg:
        # Vanilla postgres: 'postgres' superuser public schema'ya tam yetkili.
        # Supabase'e özgü auth/storage/roller bootstrap step'inde stub'lanır.
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s
          --health-timeout 5s --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: psql kur
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Supabase ortamını stub'la (auth/storage/roller/extension)
        env:
          DB: postgresql://postgres:test@localhost:5432/testdb
        run: |
          psql "$DB" -v ON_ERROR_STOP=1 <<'SQL'
          -- Extensions (migration'ların beklediği)
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
          CREATE EXTENSION IF NOT EXISTS pgcrypto;
          CREATE EXTENSION IF NOT EXISTS pg_trgm;
          -- Roller
          DO $$ BEGIN CREATE ROLE anon NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE authenticated NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE service_role NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          -- Schema'lar
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE SCHEMA IF NOT EXISTS storage;
          -- auth.users stub (profiles vb. FK referansları için)
          CREATE TABLE IF NOT EXISTS auth.users (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            email text,
            encrypted_password text,
            raw_user_meta_data jsonb,
            created_at timestamptz DEFAULT now()
          );
          -- storage.objects stub (storage policy migration'ları için)
          CREATE TABLE IF NOT EXISTS storage.objects (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            bucket_id text,
            name text,
            owner uuid,
            created_at timestamptz DEFAULT now()
          );
          CREATE TABLE IF NOT EXISTS storage.buckets (
            id text PRIMARY KEY,
            name text,
            public boolean DEFAULT false
          );
          -- auth.* helper stub'ları (RLS policy CREATE'i için var olması yeter)
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS $$ SELECT NULL::uuid $$;
          CREATE OR REPLACE FUNCTION auth.role() RETURNS text LANGUAGE sql STABLE AS $$ SELECT NULL::text $$;
          CREATE OR REPLACE FUNCTION auth.jwt() RETURNS jsonb LANGUAGE sql STABLE AS $$ SELECT '{}'::jsonb $$;
          -- storage.foldername stub (storage policy migration'ları için)
          CREATE OR REPLACE FUNCTION storage.foldername(name text) RETURNS text[] LANGUAGE sql IMMUTABLE AS $$ SELECT string_to_array(name, '/') $$;
          SQL
          echo "✅ Supabase ortamı stub'landı"

      - name: Tüm migration'ları sırayla uygula
        env:
          DB: postgresql://postgres:test@localhost:5432/testdb
        run: |
          set -e
          COUNT=0
          for m in $(ls supabase/migrations/*.sql | sort); do
            echo "→ $m"
            psql "$DB" -v ON_ERROR_STOP=1 -f "$m"
            COUNT=$((COUNT+1))
          done
          echo "✅ $COUNT migration sorunsuz uygulandı — şema %100 reproducible"

      - name: Kritik tabloların varlığını doğrula
        env:
          DB: postgresql://postgres:test@localhost:5432/testdb
        run: |
          for t in stores products orders order_items return_requests withdrawal_requests \
                   store_transactions customer_claims profiles coupons; do
            EXISTS=$(psql "$DB" -tAc "SELECT to_regclass('public.$t') IS NOT NULL;")
            if [ "$EXISTS" != "t" ]; then
              echo "::error::Kritik tablo migration'larda eksik: $t"
              exit 1
            fi
          done
          echo "✅ Tüm kritik tablolar sıfırdan kurulabiliyor"
