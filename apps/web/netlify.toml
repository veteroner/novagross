# Novagross Web (storefront)
[build]
  base = "/"
  command = "cd /opt/build/repo && pnpm install && pnpm -C apps/web build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
  PNPM_VERSION = "9"

[[plugins]]
  package = "@netlify/plugin-nextjs"
