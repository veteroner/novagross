# Novagross - Shared Netlify Configuration
# Build/publish settings are configured per-site via Netlify UI/API.
# Each site (web/admin/seller) has its own netlify.toml in its app folder.

# Plugin (applies to all Next.js sites)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ------------ Cache Headers ------------

# Prevent stale Service Worker / manifest caching
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "public, max-age=86400, immutable"

[[headers]]
  for = "/apple-touch-icon*.png"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
