# Novagross - Netlify Configuration
#
# Build cmd ve publish dir burada TANIMLI DEĞİL — her Netlify site
# (novagross-web, novagross-admin, novagross-seller) kendi build_settings'ini
# kullanır (UI/API config). Burada global plugin/env/redirect/header'lar var.
#
# Önceki versiyonda [build] section'ı default olarak apps/web/.next yayınlıyordu;
# bu yüzden admin/seller site'larında web build çıktısı görünüyordu (publish
# dir override edilmiyordu). Şimdi her site kendi publish'i ile çalışır.

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
  PNPM_VERSION = "9"

# Next.js plugin (3 site için de geçerli)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirects (yalnızca web site için anlamlı; admin/seller'da etkisiz)

# SEO: www.novagross.com → novagross.com (canonical)
[[redirects]]
  from = "https://www.novagross.com/*"
  to = "https://novagross.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.novagross.com/*"
  to = "https://novagross.com/:splat"
  status = 301
  force = true

# Admin alt domain'e yönlendir (web → admin)
[[redirects]]
  from = "/admin/*"
  to = "https://admin.novagross.com/:splat"
  status = 301
  force = true

# Prevent stale Service Worker / manifest caching (can cause broken JS/CSS via old cached responses)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"

# Prevent search engines from indexing non-page resources
[[headers]]
  for = "/favicon.ico"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "public, max-age=86400, immutable"

[[headers]]
  for = "/apple-touch-icon*.png"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
